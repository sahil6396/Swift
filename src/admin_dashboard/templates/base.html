<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Baba Swift Admin{% endblock %}</title>
  <style>
    :root {
      --bg: #0e1116;
      --panel: #161b22;
      --border: #2d333b;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #2ea043;
      --warn: #d29922;
      --danger: #f85149;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text); }
    header { display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px; background: var(--panel); border-bottom: 1px solid var(--border); }
    header h1 { margin: 0; font-size: 18px; }
    nav a { color: var(--text); text-decoration: none; margin-right: 16px; padding: 6px 10px;
      border-radius: 6px; }
    nav a:hover { background: #21262d; }
    main { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
    .card h2 { margin: 0 0 6px; font-size: 14px; color: var(--muted); font-weight: 500; }
    .card .v { font-size: 28px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; background: var(--panel);
      border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
    th { background: #1c2128; color: var(--muted); font-weight: 500; }
    tr:last-child td { border-bottom: none; }
    button, input[type="submit"] { background: var(--accent); color: white; border: none; padding: 6px 12px;
      border-radius: 6px; cursor: pointer; font-size: 13px; }
    button.warn { background: var(--warn); }
    button.danger { background: var(--danger); }
    input, textarea, select { background: #0d1117; color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 10px; font-size: 13px; }
    input[type="text"], input[type="password"], input[type="number"], textarea, select { width: 100%; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    form.inline { display: inline; }
    code { background: #1c2128; padding: 1px 6px; border-radius: 4px; font-size: 12px; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .pill.ok { background: #0d3320; color: #56d364; }
    .pill.bad { background: #3c1518; color: #ff7b72; }
    .pill.pending { background: #2d2410; color: #e3b341; }
    .muted { color: var(--muted); }
    details summary { cursor: pointer; }
  </style>
</head>
<body>
  <header>
    <h1>🛍️ Baba Swift · Admin</h1>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/products">Products</a>
      <a href="/deposits">Deposits</a>
      <a href="/withdrawals">Withdrawals</a>
      <a href="/orders">Orders</a>
      <a href="/users">Users</a>
      <a href="/logout">Logout</a>
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
