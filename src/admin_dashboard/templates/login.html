<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Baba Swift Admin</title>
  <style>
    body { background: #0e1116; color: #e6edf3; font-family: system-ui;
      display: grid; place-items: center; height: 100vh; margin: 0; }
    form { background: #161b22; border: 1px solid #2d333b; border-radius: 10px;
      padding: 32px; width: 320px; }
    h1 { margin: 0 0 16px; font-size: 18px; }
    input { width: 100%; background: #0d1117; color: #e6edf3; border: 1px solid #2d333b;
      border-radius: 6px; padding: 10px; font-size: 14px; }
    button { width: 100%; margin-top: 12px; background: #2ea043; color: white;
      border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .err { color: #ff7b72; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <form method="post" action="/login">
    <h1>🛍️ Baba Swift Admin</h1>
    <input type="password" name="password" placeholder="Dashboard password" autofocus required />
    <button type="submit">Sign in</button>
    {% if error %}<div class="err">Invalid password.</div>{% endif %}
  </form>
</body>
</html>
